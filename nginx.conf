# =============================================================================
# reverse-proxy/nginx.conf — Adopti Public Reverse Proxy
#
# Responsibilities:
#   - TLS termination toward browsers (port 443)
#   - HTTP → HTTPS redirect (port 80)
#   - Fan-out: /api/* and monitoring → API gateway (HTTPS+mTLS)
#              /       catch-all      → Next.js frontend (HTTP)
#
# NOT responsible for: rate limiting, CORS, microservice routing (gateway handles those)
# =============================================================================

# ── Outbound mTLS toward the API gateway ─────────────────────────────────────
# The reverse proxy presents its own cert as the mTLS client cert.
# The gateway enforces ssl_verify_client on and will reject connections
# that don't carry a cert signed by the shared CA.
proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
proxy_ssl_verify              on;
proxy_ssl_verify_depth        2;
proxy_ssl_protocols           TLSv1.2 TLSv1.3;
proxy_ssl_session_reuse       on;
proxy_ssl_server_name         on;
proxy_ssl_certificate         /etc/nginx/certs/server.crt;
proxy_ssl_certificate_key     /etc/nginx/certs/server.key;
proxy_connect_timeout         500ms;
proxy_next_upstream           error timeout http_502 http_503 http_504;
proxy_next_upstream_tries     2;

# Active Redundancy for the API Gateway. Both NGINX gateway nodes are active
# and stateless; the reverse proxy removes a failed node from new API traffic.
upstream gateway_pool {
    least_conn;
    server gateway-1:443 max_fails=1 fail_timeout=1s;
    server gateway-2:443 max_fails=1 fail_timeout=1s;
    keepalive 16;
}

# ── WebSocket connection upgrade map ─────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

log_format rp_access escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"ssl_protocol":"$ssl_protocol",'
      '"ssl_cipher":"$ssl_cipher",'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"user_agent":"$http_user_agent"'
    '}';

access_log /var/log/nginx/access.log rp_access;
error_log  /var/log/nginx/error.log warn;

# ── Rate Limiting Zones for Frontend APIs ────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# ── BLOCK 1: HTTP → HTTPS redirect ───────────────────────────────────────────
server {
    listen 80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── BLOCK 2: HTTPS — internet-facing TLS termination + fan-out ───────────────
server {
    listen 443 ssl;
    server_name _;

    # Browser-facing TLS — reverse proxy's own certificate
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Modern TLS only
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_ecdh_curve            secp384r1;

    # Session resumption
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    client_max_body_size 10m;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Health check (used by docker-compose healthcheck) ─────────────────────
    location = /health {
        access_log off;
        add_header Content-Type                   text/plain;
        add_header Strict-Transport-Security      "max-age=15768000; includeSubDomains" always;
        add_header X-Content-Type-Options         "nosniff"                             always;
        add_header X-Frame-Options                "DENY"                                always;
        add_header Referrer-Policy                "strict-origin-when-cross-origin"     always;
        return 200 "ok\n";
    }

    # ── WebSocket (chat) — exact match, must come before /api/chat/ ───────────
    location = /api/chat/ws {
        proxy_pass         https://gateway_pool/api/chat/ws;
        proxy_ssl_name     gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Next.js internal API routes (Route Handlers served by the frontend) ────
    # These must be listed BEFORE the /api/ catch-all that routes to the gateway.
    # /api/session  — session cookie creation & logout (lib/session.ts)
    # /api/avatar   — avatar upload helper (if present)
    location /api/session {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        set $frontend_upstream http://frontend:3000;
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/avatar {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        set $frontend_upstream http://frontend:3000;
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API traffic → API gateway (HTTPS + mTLS) ──────────────────────────────
    location /api/ {
        proxy_pass         https://gateway_pool;
        proxy_ssl_name     gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Grafana monitoring dashboard → API gateway ────────────────────────────
    location /grafana/ {
        proxy_pass         https://gateway_pool/grafana/;
        proxy_ssl_name     gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Prometheus metrics → API gateway ─────────────────────────────────────
    location /prometheus/ {
        proxy_pass         https://gateway_pool/prometheus/;
        proxy_ssl_name     gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Frontend catch-all (Next.js SSR) — plain HTTP internally ─────────────
    # Everything that is not /api/*, /grafana/, /prometheus/ falls here.
    # Next.js runs plain HTTP on :3000 inside the Docker network.
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 60s;
    }
}
